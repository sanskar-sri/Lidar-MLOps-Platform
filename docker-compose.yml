services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: lidar-mlflow
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - sqlite:////mlflow/mlflow.db
      - --default-artifact-root
      - /mlflow/artifacts
    ports:
      - "5001:5000"
    volumes:
      - ./data/mlflow:/mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dash-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lidar-dash:latest
    container_name: lidar-dash

    ports:
      - "8051:8051"

    # B2 credentials and any overrides live in .env (never committed to git).
    env_file:
      - .env

    environment:
      DASH_HOST: "0.0.0.0"
      DASH_PORT: "8051"
      DASH_DEBUG: "0"
      LOCAL_STAGING_DIR: "/app/data/local_staging"
      SILVER_LOCAL_CACHE_DIR: "/app/data/local_staging/silver_outputs"
      GOLD_LOCAL_CACHE_DIR: "/app/data/local_staging/gold_outputs"
      COMPUTE_HEALTH_POLL_MS: "4000"
      DATASETS_HOST_PREFIX: "/Users/sanskarsrivastava/Desktop/Datasets"
      DATASETS_CONTAINER_PREFIX: "/datasets"
      BROWSER_UPLOAD_SESSION_DIR: "/app/data/upload_sessions"
      BROWSER_UPLOAD_STAGING_DIR: "/tmp/browser_upload_staging"
      BROWSER_UPLOAD_CHUNK_BYTES: "${BROWSER_UPLOAD_CHUNK_BYTES:-16777216}"
      MLFLOW_INTERNAL_URL: "http://mlflow:5000"
      MLFLOW_PUBLIC_URL: "${MLFLOW_PUBLIC_URL:-http://localhost:5001}"
      MLFLOW_TRACKING_URI: "${MLFLOW_TRACKING_URI:-http://100.90.110.60:5001}"
      TRAINING_MLFLOW_TRACKING_URI: "${TRAINING_MLFLOW_TRACKING_URI:-http://100.88.150.103:5003}"
      HOST_PROJECT_DIR: "/Users/sanskarsrivastava/Desktop/data-platform"

    volumes:
      # Persist uploaded/staged data between container restarts.
      - ./data:/app/data
      # Mac Datasets folder — accessible inside the container as /datasets
      - /Users/sanskarsrivastava/Desktop/Datasets:/datasets

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8051/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
